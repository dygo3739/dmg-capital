name: DMG Signal Engine

on:
  schedule:
    - cron: '0 5 * * 1'   # Monday 5am UTC
  workflow_dispatch:

jobs:
  update-portfolio:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas numpy

      - name: Run signal engine
        run: python crypto_portfolio.py

      - name: Commit outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolios.json crypto-rotation-full-history.csv trade_history.json || true
          git diff --cached --quiet || git commit -m "chore: update signals [skip ci]"
          git push
